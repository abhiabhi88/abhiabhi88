<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-cloud"></i> Weather Dashboard</h1>
            <p class="subtitle">Get real-time weather information</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                >
                <button id="searchBtn" class="btn btn-primary">
                    <i class="fas fa-search"></i> Search
                </button>
                <button id="geolocationBtn" class="btn btn-secondary">
                    <i class="fas fa-map-marker-alt"></i> Use My Location
                </button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <!-- Loading & Error States -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="error" class="error-message" style="display: none;"></div>

        <!-- Main Weather Display -->
        <div id="weatherContainer" class="weather-container" style="display: none;">
            <!-- Current Weather Card -->
            <div class="current-weather">
                <div class="weather-header">
                    <div class="location-info">
                        <h2 id="cityName"></h2>
                        <p id="date"></p>
                    </div>
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="Weather icon">
                    </div>
                </div>

                <div class="temperature-section">
                    <div class="temp-main">
                        <span id="temperature" class="temp-value"></span>
                        <span class="temp-unit">°C</span>
                    </div>
                    <div class="temp-info">
                        <p id="weatherDescription" class="weather-desc"></p>
                        <p id="feelsLike" class="feels-like"></p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <i class="fas fa-droplets"></i>
                        <div>
                            <p class="detail-label">Humidity</p>
                            <p id="humidity" class="detail-value"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-wind"></i>
                        <div>
                            <p class="detail-label">Wind Speed</p>
                            <p id="windSpeed" class="detail-value"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-compress"></i>
                        <div>
                            <p class="detail-label">Pressure</p>
                            <p id="pressure" class="detail-value"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-eye"></i>
                        <div>
                            <p class="detail-label">Visibility</p>
                            <p id="visibility" class="detail-value"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-gauge-high"></i>
                        <div>
                            <p class="detail-label">UV Index</p>
                            <p id="uvIndex" class="detail-value"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-water"></i>
                        <div>
                            <p class="detail-label">Dew Point</p>
                            <p id="dewPoint" class="detail-value"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div class="forecast-section">
                <h3><i class="fas fa-calendar"></i> 5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-grid"></div>
            </div>

            <!-- Hourly Forecast -->
            <div class="hourly-section">
                <h3><i class="fas fa-clock"></i> Hourly Forecast (Next 24 Hours)</h3>
                <div id="hourlyContainer" class="hourly-grid"></div>
            </div>

            <!-- Air Quality -->
            <div class="air-quality-section">
                <h3><i class="fas fa-smog"></i> Air Quality Index</h3>
                <div class="air-quality-card">
                    <div id="aqiValue" class="aqi-value"></div>
                    <p id="aqiDescription" class="aqi-description"></p>
                </div>
            </div>
        </div>

        <!-- Favorites Section -->
        <div class="favorites-section">
            <h3><i class="fas fa-heart"></i> Favorite Cities</h3>
            <div class="favorites-list" id="favoritesList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
