<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-tasks"></i> My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-card">
                <i class="fas fa-list-check"></i>
                <div>
                    <p class="stat-label">Total Tasks</p>
                    <p id="totalTasks" class="stat-value">0</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div>
                    <p class="stat-label">Completed</p>
                    <p id="completedTasks" class="stat-value">0</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-circle"></i>
                <div>
                    <p class="stat-label">Pending</p>
                    <p id="pendingTasks" class="stat-value">0</p>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..." 
                    autocomplete="off"
                >
                <button id="addBtn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </div>

            <!-- Task Options -->
            <div class="task-options">
                <div class="priority-group">
                    <label>Priority:</label>
                    <select id="prioritySelect" class="select-input">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="category-group">
                    <label>Category:</label>
                    <select id="categorySelect" class="select-input">
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="date-group">
                    <label>Due Date:</label>
                    <input type="date" id="dueDateInput" class="date-input">
                </div>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-list"></i> All
            </button>
            <button class="filter-btn" data-filter="active">
                <i class="fas fa-circle"></i> Active
            </button>
            <button class="filter-btn" data-filter="completed">
                <i class="fas fa-check-circle"></i> Completed
            </button>
            <button class="filter-btn" data-filter="high">
                <i class="fas fa-flag"></i> High Priority
            </button>
            <div class="sort-group">
                <label>Sort by:</label>
                <select id="sortSelect" class="select-input">
                    <option value="date-added">Date Added</option>
                    <option value="priority">Priority</option>
                    <option value="due-date">Due Date</option>
                    <option value="alphabetical">Alphabetical</option>
                </select>
            </div>
        </div>

        <!-- Task List -->
        <div class="task-list-container">
            <div id="taskList" class="task-list"></div>
            <div id="emptyState" class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <!-- Actions Section -->
        <div class="actions-section">
            <button id="clearCompletedBtn" class="btn btn-secondary">
                <i class="fas fa-trash"></i> Clear Completed
            </button>
            <button id="clearAllBtn" class="btn btn-danger">
                <i class="fas fa-broom"></i> Clear All
            </button>
            <button id="exportBtn" class="btn btn-success">
                <i class="fas fa-download"></i> Export
            </button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Confirm Delete</h2>
            <p id="deleteMessage">Are you sure you want to delete this task?</p>
            <div class="modal-actions">
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
